services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    # Override with env vars to push to a different ACR / tag:
    #   ACR_REGISTRY=other.azurecr.io IMAGE_TAG=v2 docker compose build api
    image: ${ACR_REGISTRY:-acraianalytic.azurecr.io}/rag-for-2tb:${IMAGE_TAG:-latest}
    container_name: rag-for-2tb
    env_file:
      - path: .env
        required: false
      - path: .env.dev
        required: false
    ports:
      - "8889:8889"
    volumes:
      - ./storage:/srv/storage
      - ./db:/srv/db
